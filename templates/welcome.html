<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../static/master.css">
    <title>Image Move</title>
</head>

<body>
    <div style="position: fixed; top: 8px; right: 12px; z-index: 10;">
        <a href="/detect" style="background:#4f46e5;color:#fff;padding:6px 12px;border-radius:4px;text-decoration:none;font-family:Arial;font-size:13px;">
            Switch to Object Detection →
        </a>
    </div>
    <div style="position: fixed; top: 8px; left: 12px; z-index: 10;">
        <form id="upload-form" enctype="multipart/form-data" style="display:inline;">
            <label for="upload-input" style="background:#16a34a;color:#fff;padding:6px 12px;border-radius:4px;font-family:Arial;font-size:13px;cursor:pointer;">
                ⬆ Upload Images
            </label>
            <input id="upload-input" type="file" name="files" accept="image/*" multiple style="display:none;">
        </form>
        <span id="upload-status" style="font-family:Arial;font-size:12px;margin-left:8px;"></span>
        <script>
            document.getElementById('upload-input').addEventListener('change', async function() {
                const form = new FormData();
                for (const file of this.files) form.append('files', file);
                const status = document.getElementById('upload-status');
                status.textContent = 'Uploading…';
                try {
                    const res = await fetch('/upload', {method: 'POST', body: form});
                    const data = await res.json();
                    if (res.ok) {
                        status.textContent = `✓ Uploaded ${data.uploaded.length} file(s). Reloading…`;
                        setTimeout(() => location.reload(), 800);
                    } else {
                        status.textContent = `Error: ${data.detail}`;
                    }
                } catch(e) { status.textContent = 'Upload failed.'; }
            });
        </script>
    </div>
    <div class="split left">
        <h3 style="text-align: center;">Move Image to Designated Folder</h3><br>
        <h3 style="text-align: center;">{{pic_rem}}</h3><br>
            <div class="centered">
            <h4 style="text-align: center;">{{File}}</h4>
            <img src="../source_files/{{image}}" class="centered img">
            </div>
    </div>
    <div class="split right">
        <h3 style="text-align: center;">Cat0: {{pic4}}</h3>
        <h3 style="text-align: center;">Cat1: {{pic5}}</h3><br>
        <div class="centered">
            <form action="/img/value" method="GET">
                <label for="name">Image Name:</label><br>
                <input type="text" id="name" name="name" value="{{image}}" autofocus><br><br>
                <label for="label">Label</label><br>
                <input type="text" id="label" name="label" value="1" ><br><br>
                <input type="submit" value="Submit">
            </form>
        </div>
    </div>

</body>
</html>
